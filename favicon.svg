<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Somesh Developer Icon</title>
  <desc id="desc">Rounded square gradient background with code brackets and an S monogram for developer portfolio branding.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101725"/>
      <stop offset="55%" stop-color="#1f355f"/>
      <stop offset="100%" stop-color="#2d78b7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd36b"/>
      <stop offset="100%" stop-color="#ff9b2f"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
