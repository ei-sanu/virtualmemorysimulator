  </defs>

  <rect x="20" y="20" width="472" height="472" rx="108" fill="url(#bg)"/>
  <rect x="20" y="20" width="472" height="472" rx="108" fill="none" stroke="#77b6ff" stroke-opacity="0.35" stroke-width="8"/>

